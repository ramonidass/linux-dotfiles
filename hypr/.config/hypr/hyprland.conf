##############
### SOURCE ###
##############


# Expose the SSH socket (stored in RAM disk) to GUI apps
env = SSH_AUTH_SOCK,$XDG_RUNTIME_DIR/ssh-agent.socket

# Hand Hyprland's env to systemd + D-Bus so portal services (xdg-desktop-portal-*)
# can reach the compositor. Without this the portal fails and GTK/libadwaita apps
# (e.g. Nautilus) default to a white/light theme. Must run before other exec-once.
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE
# Bring up the graphical-session.target that xdg-desktop-portal requires (Requisite=).
# Hyprland isn't wrapped in a session manager, so nothing else activates it.
exec-once = systemctl --user start hyprland-session.target

# Start the agent using the RAM disk path
exec-once = ssh-agent -a $XDG_RUNTIME_DIR/ssh-agent.socket
exec-once = tailscale systray
exec-once = solaar



$configs = ~/.config/hypr/confs
# source=~/.config/hypr/hyprpaper.conf
source=$configs/settings.conf
source=$configs/decoration.conf
source=$configs/startup.conf
source=$configs/windowrules.conf
source=$configs/keybinds.conf
source=$configs/env.conf
source=$configs/animations.conf

source=~/.config/hypr/monitors.conf
source=~/.config/hypr/workspaces.conf

env = XCURSOR_SIZE,21
env = HYPRCURSOR_SIZE,21
env = XCURSOR_THEME,Bibata-Modern-Ice
