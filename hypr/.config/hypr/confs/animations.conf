##############
# ANIMATIONS #
##############

animations {
    enabled = 1

    # --- Modern Bezier Curves (2025–2026 popular choices) ---
    bezier = fluent, 0.1, 0.9, 0.1, 1.0          # smooth, natural deceleration
    bezier = md3_decel, 0.05, 0.7, 0.1, 1.0     # Material You style
    bezier = md3_accel, 0.3, 0.0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.05     # keep your nice overshot but use sparingly
    bezier = win_in, 0.1, 1.1, 0.1, 1.1
    bezier = liner, 1.0, 1.0, 1.0, 1.0

    # --- Animations ---
    # Windows
    animation = windowsIn, 1, 4, overshot, slide     # slightly faster open
    animation = windowsOut, 1, 4, md3_accel, slide   # clean close

    # ← This is the main one for switching between apps (focus change / move)
    animation = windowsMove, 1, 3, md3_decel         # faster + removed "slide" for snappier feel
    # If you still want a subtle slide:  animation = windowsMove, 1, 3, md3_decel, slide 30%

    # Borders & Fade
    animation = border, 1, 2, md3_decel
    animation = fade, 1, 2.5, md3_decel              # much faster than your old 10!

    # Workspaces (keep the nice vertical slide, just faster)
    animation = workspaces, 1, 4, fluent, slidevert

    # Layers (menus, launchers, bars)
    animation = layersIn, 1, 3, fluent, slide
    animation = layersOut, 1, 3, md3_accel, slide
}
